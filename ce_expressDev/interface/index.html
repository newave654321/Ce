<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Listen to the Web Of Agreement | System HUD</title>
<style>
  /* ==========================================
      ZONE 1: CORE HUD STYLING
      ========================================== */
  body {
    margin: 0; font-family: system-ui, -apple-system, sans-serif;
    height: 100vh; display: flex; overflow: hidden;
    background: linear-gradient(180deg,#eaf4ff 0%,#ffffff 45%,#dfe7f0 100%);
  }

  #sidebar {
    width: 400px; min-width: 400px; background: #ffffff; padding: 20px;
    display: flex; flex-direction: column; gap: 15px;
    box-shadow: 2px 0 12px rgba(0,0,0,0.05); overflow-y: auto; z-index: 10;
  }

  .sidebar-card {
    background: #ffffff; border-radius: 16px; padding: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.04); border: 1px solid #f0f4f8;
  }

  /* --- HUD ANIMATION UPGRADES --- */
  .protocol-card {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    margin-bottom: 15px;
  }

  .protocol-card.active { opacity: 1; transform: translateY(0) translateX(0); }

  .protocol-card.exit-right {
    opacity: 0 !important;
    transform: translate(100px, 0) !important; 
    transition: all 0.6s cubic-bezier(0.4, 0, 1, 1);
  }

  .card-icon-header {
    font-size: 14px; font-weight: 800; color: #3498db;
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .card-icon-header svg { filter: drop-shadow(0 0 5px rgba(52, 152, 219, 0.3)); }

  #ce-logo-view, #ce-profile-view { transition: all 0.6s ease; }
  .hidden-node { opacity: 0; transform: scale(0.55); pointer-events: none; }
  
  #side-p-img { transition: opacity 0.8s ease, transform 0.8s ease; opacity: 1; }
  .img-fade { opacity: 0 !important; transform: scale(0.9); }

  #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; gap: 20px; }
  #query-bar {
    width: 80%; max-width: 700px; padding: 24px 30px; border-radius: 20px;
    font-size: 1.3rem; outline: none; border: 1px solid rgba(11, 99, 255, 0.05);
    box-shadow: 0 15px 35px rgba(11, 99, 255, 0.1); transition: all 0.3s ease;
  }

  .nav-link, .ce-content-btn { 
    color: #3498db; text-decoration: none; font-weight: 600; font-size: 14px; 
    background: white; padding: 10px 20px; border-radius: 10px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); z-index: 100; cursor: pointer; border: none;
  }

  .ce-content-btn:hover, .nav-link:hover { background: #eef4ff; }

</style>
</head>
<body>

  <!-- LANGUAGE SELECTION HUB -->
  <div id="language-protocol-hub" style="position: fixed; top: 30px; right: 210px; z-index: 100; background: white; padding: 8px 12px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px; border: 1px solid #eef2f6;">
    <span style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase;">Language:</span>
    <select id="global-lang-engine" onchange="runLanguageHandshake(this.value)" style="border: none; background: transparent; font-weight: 600; cursor: pointer; outline: none;">
      <option value="en">English</option><option value="es">Español</option><option value="fr">French</option><option value="de">German</option>
      <option value="nl">Dutch</option><option value="zh">Chinese</option><option value="ru">Russian</option><option value="jp">Japanese</option><option value="kr">Korean</option>
    </select>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <!-- PROFILE CARD -->
    <div class="sidebar-card" id="ce-identity-hub" style="min-height: 120px; display: flex; align-items: center; justify-content: center; position: relative;">
      <div id="ce-logo-view"><div class="ce-pulsing-logo"><img src="Ce_logo.png" style="width: 30%; height: 30%; object-fit: contain;"></div></div>
      <div id="ce-profile-view" style="display: none; flex-direction: column; align-items: center;" class="hidden-node">
        <img id="side-p-img" src="" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #3498db; margin-bottom: 8px;">
        <div id="side-p-name" style="font-weight: 700; font-size: 14px; color: #333;">Neighbor</div>
        <div id="side-p-proto" style="font-size: 9px; color: #3498db; text-transform: uppercase; font-weight: 800;">Seeking Global ID...</div>
      </div>
    </div>

    <!-- NEIGHBORHOOD PULSE -->
    <div class="sidebar-card">
      <div style="font-size: 11px; font-weight: 800; color: #8899aa; margin-bottom: 5px; text-transform: uppercase;">Neighborhood Pulse</div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size: 13px; font-weight: 600; color: #444;">Daily Prospectors</span>
        <span id="val-prospectors" style="font-family: monospace; font-weight: 800; color: #3498db; background: #eef4ff; padding: 2px 8px; border-radius: 6px;">0</span>
      </div>
    </div>

    <!-- ACTIVE COORDINATIONS -->
    <div id="active-coordinations" style="display: flex; flex-direction: column; gap: 10px;"></div>

    <!-- NEIGHBORHOOD SECTION -->
    <div class="sidebar-card">
      <div class="sidebar-title" style="display:flex; align-items:center; gap:8px;">
        <div style="width:8px; height:8px; background:#3498db; border-radius:50%;"></div>
        <span id="lbl-neighborhood">NEIGHBORHOOD</span>
      </div>
      <div id="query-results-container"></div>
      <div id="node-list" style="color: #8899aa; font-size: 13px; margin-bottom: 10px;">Scanning mesh...</div>
      <div id="neighbor-static-container"></div>
    </div>

   <!-- SYSTEM PULSE -->
   <div class="sidebar-card">
      <div style="font-size: 12px; font-weight: 700; color: #3498db; margin-bottom: 10px;">SYSTEM PULSE</div>
      <div style="display:flex; justify-content:space-between; font-size:9px; font-weight:800; color:#2ecc71; margin-bottom:4px;">
        <span>TRUST AGGREGATE</span><span id="val-trust">0.10</span>
      </div>
      <canvas id="canvas-trust" style="width:100%; height:20px;"></canvas>
      <div style="display:flex; justify-content:space-between; font-size:9px; font-weight:800; color:#8899aa; margin: 8px 0 4px 0;">
        <span>ENERGY</span><span id="val-energy">0.10</span>
      </div>
      <canvas id="canvas-energy" style="width:100%; height:20px;"></canvas>
      <div style="display:flex; justify-content:space-between; font-size:9px; font-weight:800; color:#8899aa; margin: 8px 0 4px 0;">
        <span>CARBON</span><span id="val-carbon">0.10</span>
      </div>
      <canvas id="canvas-carbon" style="width:100%; height:20px;"></canvas>
      <div id="storage-warning">⚠️ MESH CAPACITY CRITICAL</div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div id="main">
    <div style="display:flex; gap:15px;">
      <a href="profile.html" class="nav-link">Neighbor Profile</a>
      <button class="ce-content-btn">Folder</button>
    </div>
    <h1 id="lbl-web-title" style="color: #222; font-weight: 800; margin-bottom: 30px;">Web of Agreement</h1>
    <input type="text" id="query-bar" placeholder="Drop a request to the mesh...">
    <p id="broadcast-hint" style="margin-top: 25px; color: #778899; font-size: 14px;">Press Enter to broadcast.</p>
  </div>

  <!-- SCRIPTING: EXISTING LOGIC KEPT INTACT -->
  <script>
    // All your previous JavaScript logic for mesh, profile card, energy bars, agreements, language, etc.
  </script>

</body>
</html>
