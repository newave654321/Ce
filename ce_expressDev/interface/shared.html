<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ce Content | Shared Asset</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root {
    --local-blue: #3498db;
    --bg-gray: #f5f7f9;
    --border: #e0e0e0;
    --text: #333;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg-gray);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 8px;
    padding: 40px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

h2 { margin-top: 0; }

.meta {
    font-family: monospace;
    font-size: 11px;
    color: var(--local-blue);
    background: #eef2f6;
    padding: 4px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 20px;
}

.status-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.locked {
    background: #fdecea;
    color: #c0392b;
}

.unlocked {
    background: #e8f8f5;
    color: #27ae60;
}

.content-area {
    margin-top: 30px;
    line-height: 1.6;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Shared Asset</h2>
        <span id="asset-status" class="status-pill unlocked">Unbound</span>
    </div>

    <div class="meta" id="asset-path">
        /ce_content/unbound_asset
    </div>

    <div class="content-area">
        This asset may bind to a Master Key for monetization.
        <br><br>
        If a valid Ce identity is present, revenue routing activates.
    </div>
</div>

<script>
function initializeBinding() {
    const idData = JSON.parse(localStorage.getItem('ce_identity_data') || '{}');
    const isLocked = localStorage.getItem('ce_identity_locked') === 'true';

    const pathEl = document.getElementById('asset-path');
    const statusEl = document.getElementById('asset-status');

    if (isLocked && idData.masterKey) {
        pathEl.innerText = `/ce_content/${idData.masterKey}`;
        statusEl.innerText = "Bound";
        statusEl.classList.remove("unlocked");
        statusEl.classList.add("locked");
    } else {
        pathEl.innerText = `/ce_content/unbound_asset`;
        statusEl.innerText = "Unbound";
        statusEl.classList.remove("locked");
        statusEl.classList.add("unlocked");
    }
}

initializeBinding();
</script>

</body>
</html>
